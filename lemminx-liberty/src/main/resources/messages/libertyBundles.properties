liberty.lemminx.config.generation.maven.step4=4. Ensure Maven is installed and accessible from command line
liberty.lemminx.config.generation.gradle.step1=1. Ensure you are using liberty-gradle-plugin version 4.1 or later
liberty.lemminx.config.generation.gradle.step2=2. Run \'./gradlew libertyPrepareConfig\' manually in your project
liberty.lemminx.config.generation.gradle.step3=3. Check that your build.gradle has the liberty-gradle-plugin configured
liberty.lemminx.config.generation.gradle.step4=4. Ensure Gradle is installed and accessible from command line
liberty.lemminx.config.generation.generic.step1=1. Ensure you are using the latest version of liberty-maven-plugin or liberty-gradle-plugin
liberty.lemminx.config.generation.generic.step2=2. Run the prepare-config goal manually in your project
liberty.lemminx.config.generation.generic.step3=3. Check that your build file has the Liberty plugin configured
